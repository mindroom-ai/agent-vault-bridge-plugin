name: agent-vault-bridge
enabled: true
settings:
  vault_api: http://127.0.0.1:14321
  vault_proxy: https://127.0.0.1:14322
  ca_path: /etc/ssl/agent-vault-ca.pem
  session_ttl_seconds: 86400
  brokered_hosts:
    - api.github.com
  gated_tools:
    - shell
  bootstrap:
    method: docker_exec
    container: agent-vault
